# LOCAL H2 DATABASE – WORKS 100% ON YOUR LAPTOP (NO INTERNET NEEDED)
# ←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←

spring.application.name=backend

# Port the backend will run on (you can keep 3000 or change to 8080)
server.port=3000

# H2 Database (file stored in backend/data folder)
spring.datasource.url=jdbc:h2:file:./data/collabdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Enable H2 Console (very useful – go to http://localhost:3000/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT secret (keep the same or change it later)
JWT_SECRET_KEY=0a287a2e5c073eb8a7e049d914252e8ab1c4620bd8cba1b0ad594c3f7313ea8a

# Optional pretty logs (you can delete these if you want)
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG